<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 知识库 · 学习门户 v2.0</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #1a4d7a;
            --primary-light: #eaf1fa;
            --bg: #f4f7fc;
            --card: #ffffff;
            --text: #1e2a41;
            --text-light: #55708b;
            --shadow: 0 4px 20px rgba(0, 20, 40, 0.06);
            --radius: 18px;
            --radius-sm: 12px;
        }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== 登录覆盖层（保持不变，略） ===== */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        #loginOverlay.hidden {
            display: none;
        }
        .login-box {
            background: white;
            max-width: 420px;
            width: 100%;
            padding: 40px 36px;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .login-box .icon {
            font-size: 52px;
            margin-bottom: 6px;
        }
        .login-box h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-box p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 22px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #dce4ed;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 14px;
        }
        .login-box input:focus {
            border-color: var(--primary);
        }
        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .login-box .btn-login:hover {
            background: #103a5e;
        }
        .login-box .error {
            color: #c72a2a;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .login-box .hint {
            font-size: 12px;
            color: #8a9bb0;
            margin-top: 16px;
        }

        /* ===== 顶栏 ===== */
        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 12px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .topbar h1 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar h1 small {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-light);
        }
        .topbar .right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .topbar .right .search-box {
            display: flex;
            align-items: center;
            background: #f0f4fa;
            border-radius: 40px;
            padding: 4px 16px;
            gap: 6px;
        }
        .topbar .right .search-box input {
            border: none;
            background: transparent;
            padding: 6px 4px;
            font-size: 14px;
            outline: none;
            width: 120px;
            transition: 0.2s;
        }
        .topbar .right .search-box input:focus {
            width: 180px;
        }
        .topbar .right .search-box .icon {
            color: var(--text-light);
            font-size: 14px;
        }
        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: #103a5e;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #dce4ed;
            color: var(--text-light);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-danger-outline {
            background: transparent;
            border: 1.5px solid #f5c6cb;
            color: #c72a2a;
        }
        .btn-danger-outline:hover {
            background: #f8d7da;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* ===== 分区网格 ===== */
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .section-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 18px 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.15s;
            border-left: 5px solid var(--primary);
            position: relative;
        }
        .section-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 20, 40, 0.10);
        }
        .section-card .emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 2px;
        }
        .section-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .section-card p {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.4;
        }
        .section-card .count {
            display: inline-block;
            margin-top: 8px;
            font-size: 12px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 600;
        }
        .section-card .card-actions {
            position: absolute;
            top: 10px;
            right: 12px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: 0.15s;
        }
        .section-card:hover .card-actions {
            opacity: 1;
        }
        .section-card .card-actions button {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #dce4ed;
            border-radius: 40px;
            padding: 1px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .section-card .card-actions .del:hover {
            background: #c72a2a;
            color: white;
            border-color: #c72a2a;
        }
        @media (max-width: 600px) {
            .section-card .card-actions {
                opacity: 1;
            }
        }

        /* ===== 内容区 ===== */
        .content-area {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            min-height: 200px;
            display: none;
        }
        .content-area.active {
            display: block;
        }
        .content-area .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border: 1.5px solid #dce4ed;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: transparent;
            cursor: pointer;
            margin-bottom: 12px;
            color: var(--text-light);
        }
        .content-area .back:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .content-area .header-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .content-area .header-row h2 {
            font-size: 20px;
        }
        .content-area .header-row .tag-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .content-area .header-row .tag-filter .tag-btn {
            background: #eef2f7;
            border: none;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-light);
        }
        .content-area .header-row .tag-filter .tag-btn.active {
            background: var(--primary);
            color: white;
        }
        .content-area .sub {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 14px;
        }
        .content-area .item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .content-area .item-list .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8fafd;
            border-radius: var(--radius-sm);
            border: 1px solid #eef2f7;
            transition: 0.1s;
            cursor: pointer;
        }
        .content-area .item-list .item:hover {
            background: #f0f6ff;
            border-color: #cbd6e3;
        }
        .content-area .item-list .item .left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .content-area .item-list .item .left .name {
            font-weight: 500;
        }
        .content-area .item-list .item .left .tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .content-area .item-list .item .left .tags .tag {
            background: #e8edf4;
            font-size: 11px;
            padding: 0 8px;
            border-radius: 40px;
            color: var(--text-light);
        }
        .content-area .item-list .item .right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .content-area .item-list .item .right .meta {
            font-size: 12px;
            color: var(--text-light);
        }
        .content-area .add-btn {
            margin-top: 14px;
            padding: 10px 20px;
            border: 2px dashed #dce4ed;
            border-radius: 40px;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
        }
        .content-area .add-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .empty-state {
            color: var(--text-light);
            font-size: 14px;
            padding: 30px 0;
            text-align: center;
        }

        /* ===== 详情弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-detail {
            background: white;
            max-width: 560px;
            width: 100%;
            border-radius: 24px;
            padding: 28px 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-detail .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-light);
            cursor: pointer;
        }
        .modal-detail h2 {
            font-size: 20px;
            margin-bottom: 4px;
            padding-right: 30px;
        }
        .modal-detail .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 12px;
        }
        .modal-detail .detail-tags .tag {
            background: #e8edf4;
            font-size: 12px;
            padding: 0 12px;
            border-radius: 40px;
            color: var(--text-light);
        }
        .modal-detail .field {
            margin-bottom: 14px;
        }
        .modal-detail .field label {
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin-bottom: 2px;
            color: var(--text-light);
        }
        .modal-detail .field input,
        .modal-detail .field textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dce4ed;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .modal-detail .field textarea {
            min-height: 60px;
            resize: vertical;
        }
        .modal-detail .field .link-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-top: 4px;
        }
        .modal-detail .field .link-btn:hover {
            background: #103a5e;
        }
        .modal-detail .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: flex-end;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            margin-top: 24px;
            padding: 12px;
            border-top: 1px solid #eef2f7;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 12px 16px;
            }
            .topbar .right {
                flex-wrap: wrap;
            }
            .topbar .right .search-box input {
                width: 100px;
            }
            .topbar .right .search-box input:focus {
                width: 140px;
            }
            .section-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .section-card {
                padding: 14px 14px 12px;
            }
            .section-card .emoji {
                font-size: 24px;
            }
            .content-area {
                padding: 16px;
            }
            .modal-detail {
                padding: 20px 18px;
            }
        }
        @media (max-width: 400px) {
            .section-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 登录覆盖层 ===== -->
    <div id="loginOverlay">
        <div class="login-box">
            <div class="icon">📚</div>
            <h2>知识库 · 个人门户</h2>
            <p>输入密码以访问您的学习空间</p>
            <input type="password" id="pwdInput" placeholder="请输入密码" autofocus>
            <button class="btn-login" id="loginBtn">进入知识库</button>
            <div class="error" id="loginError"></div>
            <div class="hint">💡 默认密码：<strong>study2025</strong>（登录后可修改）</div>
        </div>
    </div>

    <!-- ===== 主界面 ===== -->
    <div class="container" id="mainApp" style="display:none;">

        <!-- 顶栏 -->
        <header class="topbar">
            <h1>📚 知识库 <small>· 学习门户 v2.0</small></h1>
            <div class="right">
                <div class="search-box">
                    <span class="icon">🔍</span>
                    <input type="text" id="globalSearch" placeholder="搜索条目..." oninput="renderAll()">
                </div>
                <button class="btn btn-primary" id="addSectionBtn">➕ 新建分区</button>
                <button class="btn btn-outline" onclick="exportData()">📤 备份</button>
                <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📥 恢复</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                <button class="btn btn-outline" id="logoutBtn">退出</button>
            </div>
        </header>

        <!-- 分区卡片 -->
        <div class="section-grid" id="sectionGrid"></div>

        <!-- 内容展示区 -->
        <div class="content-area" id="contentArea">
            <button class="back" id="backBtn">← 返回</button>
            <div class="header-row">
                <h2 id="contentTitle">标题</h2>
                <div class="tag-filter" id="tagFilterBar"></div>
            </div>
            <div class="sub" id="contentSub">描述</div>
            <div class="item-list" id="itemList">
                <div class="empty-state">📭 暂无内容，点击下方添加</div>
            </div>
            <button class="add-btn" id="addItemBtn">➕ 添加新条目</button>
        </div>

        <div class="footer">
            📌 数据保存在本地浏览器 · 建议定期备份
        </div>
    </div>

    <!-- ===== 详情弹窗 ===== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-detail">
            <button class="close-btn" onclick="closeDetail()">✕</button>
            <h2 id="detailTitle">条目名称</h2>
            <div class="detail-tags" id="detailTags"></div>

            <div class="field">
                <label>📎 资料链接（百度/阿里云盘等）</label>
                <input type="url" id="detailLink" placeholder="粘贴分享链接...">
                <a href="#" id="detailLinkBtn" class="link-btn" target="_blank">📂 打开资料</a>
            </div>

            <div class="field">
                <label>🏷️ 标签（用逗号分隔）</label>
                <input type="text" id="detailTagsInput" placeholder="例如：量子计算, 复习笔记, 2025">
            </div>

            <div class="field">
                <label>📝 个人备注</label>
                <textarea id="detailNote" placeholder="记录你的思考、重点、待办..."></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-outline" onclick="closeDetail()">关闭</button>
                <button class="btn btn-primary" id="saveDetailBtn">💾 保存修改</button>
            </div>
        </div>
    </div>

    <!-- ===== 模态框：新建/编辑分区（略，保持原样） ===== -->
    <div class="modal-overlay" id="sectionModal">
        <div class="modal-detail">
            <h2 id="sectionModalTitle">新建分区</h2>
            <div class="field"><label>分区名称 *</label><input type="text" id="sectionNameInput" placeholder="例如：量子计算笔记"></div>
            <div class="field"><label>图标 (Emoji)</label><input type="text" id="sectionEmojiInput" placeholder="例如：🔬" value="📁"></div>
            <div class="field"><label>描述</label><input type="text" id="sectionDescInput" placeholder="简短描述该分区的用途"></div>
            <div class="actions">
                <button class="btn btn-outline" onclick="closeSectionModal()">取消</button>
                <button class="btn btn-primary" id="saveSectionBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const CONFIG = {
            password: 'study2025',
            storageKey: 'knowledge_base_v2'
        };

        let data = {};
        let editingSectionKey = null;
        let currentSection = null;
        let currentTagFilter = null;
        let editingItemId = null;

        // ============================================================
        // 默认分区
        // ============================================================
        function getDefaultSections() {
            return {
                notes: {
                    label: '课程笔记',
                    icon: '📝',
                    desc: '各科课堂笔记、讲义整理',
                    items: []
                },
                coding: {
                    label: '编程空间',
                    icon: '💻',
                    desc: '代码片段、算法练习、项目',
                    items: []
                },
                practice: {
                    label: '刷题室',
                    icon: '📊',
                    desc: 'Past papers、习题集、模拟',
                    items: []
                },
                review: {
                    label: '知识巩固',
                    icon: '🔄',
                    desc: '间隔复习、知识卡片',
                    items: []
                },
                retro: {
                    label: '阶段回顾',
                    icon: '📅',
                    desc: '周/月总结、目标追踪',
                    items: []
                },
                charge: {
                    label: '课程充电站',
                    icon: '⚡',
                    desc: '课程 Sheets、拓展资源',
                    items: []
                }
            };
        }

        // ============================================================
        // 数据管理
        // ============================================================
        function loadData() {
            const stored = localStorage.getItem(CONFIG.storageKey);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    let valid = true;
                    for (const key of Object.keys(parsed)) {
                        if (!parsed[key].items || !Array.isArray(parsed[key].items)) { valid = false; break; }
                        if (!parsed[key].label || !parsed[key].icon) { valid = false; break; }
                    }
                    if (valid && Object.keys(parsed).length > 0) { data = parsed; return; }
                } catch (e) {}
            }
            data = getDefaultSections();
            saveData();
        }

        function saveData() {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(data));
            renderAll();
        }

        function getItems(sectionKey) {
            return data[sectionKey]?.items || [];
        }

        // ============================================================
        // 分区操作
        // ============================================================
        function addSection(key, label, icon, desc) {
            if (data[key]) { alert('该分区标识已存在'); return false; }
            data[key] = { label, icon: icon || '📁', desc: desc || '', items: [] };
            saveData();
            return true;
        }

        function updateSection(key, label, icon, desc) {
            if (!data[key]) return false;
            data[key] = { ...data[key], label, icon: icon || '📁', desc: desc || '' };
            saveData();
            return true;
        }

        function deleteSection(key) {
            if (!data[key]) return false;
            const count = getItems(key).length;
            if (count > 0) {
                if (!confirm(`分区「${data[key].label}」中有 ${count} 个条目，确定删除？`)) return false;
            } else {
                if (!confirm(`确定删除分区「${data[key].label}」？`)) return false;
            }
            delete data[key];
            saveData();
            return true;
        }

        // ============================================================
        // 条目操作（升级版：支持链接、标签、备注）
        // ============================================================
        function addItem(sectionKey, name, link = '', tags = '', note = '') {
            if (!data[sectionKey]) return;
            data[sectionKey].items.push({
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
                name: name,
                link: link || '',
                tags: tags || '',
                note: note || '',
                createdAt: new Date().toLocaleDateString()
            });
            saveData();
            renderItems(sectionKey);
        }

        function updateItem(sectionKey, id, name, link, tags, note) {
            if (!data[sectionKey]) return;
            const item = data[sectionKey].items.find(it => it.id === id);
            if (item) {
                item.name = name || item.name;
                item.link = link !== undefined ? link : item.link;
                item.tags = tags !== undefined ? tags : item.tags;
                item.note = note !== undefined ? note : item.note;
                saveData();
                renderItems(sectionKey);
            }
        }

        function deleteItem(sectionKey, id) {
            if (!data[sectionKey]) return;
            if (!confirm('确定删除该条目吗？')) return;
            data[sectionKey].items = data[sectionKey].items.filter(it => it.id !== id);
            saveData();
            renderItems(sectionKey);
        }

        function getItem(sectionKey, id) {
            if (!data[sectionKey]) return null;
            return data[sectionKey].items.find(it => it.id === id) || null;
        }

        // ============================================================
        // 搜索与标签
        // ============================================================
        function getAllItems() {
            const result = [];
            for (const [sectionKey, section] of Object.entries(data)) {
                for (const item of section.items) {
                    result.push({ ...item, sectionKey, sectionLabel: section.label });
                }
            }
            return result;
        }

        function searchItems(query) {
            if (!query.trim()) return getAllItems();
            const q = query.trim().toLowerCase();
            return getAllItems().filter(item =>
                item.name.toLowerCase().includes(q) ||
                (item.tags && item.tags.toLowerCase().includes(q)) ||
                (item.note && item.note.toLowerCase().includes(q))
            );
        }

        // ============================================================
        // 渲染
        // ============================================================
        function renderAll() {
            renderSections();
            if (currentSection) renderItems(currentSection);
            else document.getElementById('contentArea').classList.remove('active');
            updateCounts();
        }

        function renderSections() {
            const grid = document.getElementById('sectionGrid');
            const keys = Object.keys(data);
            if (keys.length === 0) {
                grid.innerHTML =
                    `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#6b7f98;background:white;border-radius:20px;"><h3 style="color:#1e2a41;">📭 暂无分区</h3><p>点击「新建分区」开始创建</p></div>`;
                return;
            }
            grid.innerHTML = keys.map(key => {
                const s = data[key];
                const count = s.items.length;
                return `
                    <div class="section-card" data-section="${key}">
                        <div class="card-actions">
                            <button onclick="event.stopPropagation(); editSectionUI('${key}')">✏️</button>
                            <button class="del" onclick="event.stopPropagation(); deleteSection('${key}')">✕</button>
                        </div>
                        <span class="emoji">${s.icon || '📁'}</span>
                        <h3>${s.label}</h3>
                        <p>${s.desc || '无描述'}</p>
                        <span class="count">${count} 项</span>
                    </div>
                `;
            }).join('');
            grid.querySelectorAll('.section-card').forEach(card => {
                card.addEventListener('click', function() {
                    const key = this.dataset.section;
                    if (key) openSection(key);
                });
            });
        }

        function openSection(sectionKey) {
            currentSection = sectionKey;
            currentTagFilter = null;
            const s = data[sectionKey];
            if (!s) return;
            document.getElementById('contentTitle').textContent = `${s.icon || '📁'} ${s.label}`;
            document.getElementById('contentSub').textContent = s.desc || '无描述';
            document.getElementById('contentArea').classList.add('active');
            renderItems(sectionKey);
            document.getElementById('contentArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderItems(sectionKey) {
            const items = getItems(sectionKey);
            const list = document.getElementById('itemList');
            const filterBar = document.getElementById('tagFilterBar');

            // 收集所有标签
            const allTags = new Set();
            items.forEach(it => {
                if (it.tags) it.tags.split(',').forEach(t => { const tag = t.trim(); if (tag) allTags.add(tag); });
            });

            let filtered = items;
            if (currentTagFilter) {
                filtered = items.filter(it => it.tags && it.tags.split(',').some(t => t.trim() === currentTagFilter));
            }

            // 渲染标签过滤器
            filterBar.innerHTML = '';
            if (allTags.size > 0) {
                const clearBtn = document.createElement('button');
                clearBtn.textContent = '全部';
                clearBtn.className = 'tag-btn' + (currentTagFilter === null ? ' active' : '');
                clearBtn.onclick = () => { currentTagFilter = null;
                    renderItems(sectionKey); };
                filterBar.appendChild(clearBtn);
                allTags.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.textContent = '#' + tag;
                    btn.className = 'tag-btn' + (currentTagFilter === tag ? ' active' : '');
                    btn.onclick = () => { currentTagFilter = tag;
                        renderItems(sectionKey); };
                    filterBar.appendChild(btn);
                });
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state">📭 ${items.length === 0 ? '暂无内容，点击下方添加' : '没有匹配该标签的条目'}</div>`;
                return;
            }

            list.innerHTML = filtered.map(item => {
                const tags = item.tags ? item.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
                return `
                    <div class="item" onclick="openDetail('${sectionKey}','${item.id}')">
                        <div class="left">
                            <span class="name">${escapeHtml(item.name)}</span>
                            ${tags.length > 0 ? `<div class="tags">${tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                        </div>
                        <div class="right">
                            ${item.link ? `<span style="font-size:12px;color:var(--text-light);">🔗</span>` : ''}
                            <span class="meta">${item.createdAt || ''}</span>
                            <button onclick="event.stopPropagation(); deleteItem('${sectionKey}','${item.id}')" style="background:none;border:none;color:#c72a2a;cursor:pointer;font-size:16px;">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

            // 在渲染分区时已更新
        }

            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
