<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 个人知识库 · 完全自定义版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #1a4d7a;
            --primary-light: #eaf1fa;
            --bg: #f4f7fc;
            --card: #ffffff;
            --text: #1e2a41;
            --text-light: #55708b;
            --shadow: 0 4px 20px rgba(0, 20, 40, 0.06);
            --radius: 18px;
        }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== 登录覆盖层 ===== */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        #loginOverlay.hidden {
            display: none;
        }
        .login-box {
            background: white;
            max-width: 420px;
            width: 100%;
            padding: 40px 36px;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .login-box .icon {
            font-size: 52px;
            margin-bottom: 6px;
        }
        .login-box h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-box p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 22px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #dce4ed;
            border-radius: 40px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 14px;
        }
        .login-box input:focus {
            border-color: var(--primary);
        }
        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .login-box .btn-login:hover {
            background: #103a5e;
        }
        .login-box .error {
            color: #c72a2a;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .login-box .hint {
            font-size: 12px;
            color: #8a9bb0;
            margin-top: 16px;
        }

        /* ===== 顶栏 ===== */
        .topbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 14px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        .topbar h1 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar h1 small {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-light);
        }
        .topbar .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .topbar .user-badge span {
            font-size: 14px;
            color: var(--text-light);
        }
        .topbar .user-badge .btn-outline {
            padding: 6px 18px;
            border: 1.5px solid #dce4ed;
            border-radius: 40px;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.15s;
        }
        .topbar .user-badge .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .topbar .user-badge .btn-logout {
            padding: 6px 18px;
            border: 1.5px solid #dce4ed;
            border-radius: 40px;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.15s;
        }
        .topbar .user-badge .btn-logout:hover {
            border-color: #c72a2a;
            color: #c72a2a;
        }
        .topbar .user-badge .btn-primary-sm {
            padding: 6px 18px;
            border: none;
            border-radius: 40px;
            background: var(--primary);
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .topbar .user-badge .btn-primary-sm:hover {
            background: #103a5e;
        }

        /* ===== 分区网格 ===== */
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }
        .section-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 22px 20px 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: 0.15s;
            border-left: 5px solid var(--primary);
            text-decoration: none;
            color: var(--text);
            display: block;
            position: relative;
        }
        .section-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 20, 40, 0.08);
        }
        .section-card .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }
        .section-card h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .section-card p {
            font-size: 13px;
            color: var(--text-light);
            line-height: 1.5;
        }
        .section-card .count {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 600;
        }
        .section-card .card-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: 0.15s;
        }
        .section-card:hover .card-actions {
            opacity: 1;
        }
        .section-card .card-actions button {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #dce4ed;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.1s;
            color: var(--text-light);
        }
        .section-card .card-actions button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .section-card .card-actions .del:hover {
            background: #c72a2a;
            border-color: #c72a2a;
        }

        /* ===== 内容区 ===== */
        .content-area {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px 28px;
            box-shadow: var(--shadow);
            min-height: 200px;
            display: none;
        }
        .content-area.active {
            display: block;
        }
        .content-area .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border: 1.5px solid #dce4ed;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            background: transparent;
            cursor: pointer;
            margin-bottom: 16px;
            color: var(--text-light);
            transition: 0.15s;
        }
        .content-area .back:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .content-area h2 {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .content-area .sub {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 18px;
        }
        .content-area .item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .content-area .item-list .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8fafd;
            border-radius: 12px;
            border: 1px solid #eef2f7;
            transition: 0.1s;
        }
        .content-area .item-list .item:hover {
            background: #f0f6ff;
        }
        .content-area .item-list .item .name {
            font-weight: 500;
        }
        .content-area .item-list .item .meta {
            font-size: 12px;
            color: var(--text-light);
        }
        .content-area .add-btn {
            margin-top: 16px;
            padding: 10px 20px;
            border: 2px dashed #dce4ed;
            border-radius: 40px;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
        }
        .content-area .add-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .empty-state {
            color: var(--text-light);
            font-size: 14px;
            padding: 30px 0;
            text-align: center;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            margin-top: 28px;
            padding: 12px;
            border-top: 1px solid #eef2f7;
        }

        /* ===== 模态框 ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        .modal.show {
            display: flex;
        }
        .modal-box {
            background: white;
            max-width: 460px;
            width: 100%;
            border-radius: 24px;
            padding: 32px 36px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15);
        }
        .modal-box h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }
        .modal-box label {
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin: 14px 0 4px 0;
            color: #1a2a44;
        }
        .modal-box input,
        .modal-box select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dce4ed;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        .modal-box .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal-box .btn {
            padding: 8px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .modal-box .btn-primary {
            background: var(--primary);
            color: white;
        }
        .modal-box .btn-primary:hover {
            background: #103a5e;
        }
        .modal-box .btn-outline {
            background: transparent;
            border: 1.5px solid #dce4ed;
            color: var(--text-light);
        }
        .modal-box .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 14px 18px;
            }
            .topbar h1 {
                font-size: 18px;
            }
            .section-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .section-card {
                padding: 16px 14px;
            }
            .section-card .emoji {
                font-size: 26px;
            }
            .section-card .card-actions {
                opacity: 1;
                top: 8px;
                right: 8px;
            }
            .section-card .card-actions button {
                font-size: 10px;
                padding: 1px 8px;
            }
            .content-area {
                padding: 18px 16px;
            }
            .login-box {
                padding: 30px 24px;
                margin: 0 12px;
            }
            .modal-box {
                padding: 24px 20px;
            }
        }
        @media (max-width: 400px) {
            .section-grid {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f7;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd6e3;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ===== 登录覆盖层 ===== -->
    <div id="loginOverlay">
        <div class="login-box">
            <div class="icon">📚</div>
            <h2>知识库 · 个人门户</h2>
            <p>输入密码以访问您的学习空间</p>
            <input type="password" id="pwdInput" placeholder="请输入密码" autofocus>
            <button class="btn-login" id="loginBtn">进入知识库</button>
            <div class="error" id="loginError"></div>
            <div class="hint">💡 默认密码：<strong>study2025</strong>（登录后可修改）</div>
        </div>
    </div>

    <!-- ===== 主界面 ===== -->
    <div class="container" id="mainApp">

        <!-- 顶栏 -->
        <header class="topbar">
            <h1>
                📚 知识库
                <small>· 完全自定义</small>
            </h1>
            <div class="user-badge">
                <span>👤 本人</span>
                <button class="btn-primary-sm" id="addSectionBtn">➕ 新建分区</button>
                <button class="btn-outline" onclick="exportData()">📤 备份</button>
                <button class="btn-outline" onclick="document.getElementById('importFile').click()">📥 恢复</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                <button class="btn-logout" id="logoutBtn">退出</button>
            </div>
        </header>

        <!-- 分区卡片 -->
        <div class="section-grid" id="sectionGrid">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

        <!-- 内容展示区 -->
        <div class="content-area" id="contentArea">
            <button class="back" id="backBtn">← 返回</button>
            <h2 id="contentTitle">标题</h2>
            <div class="sub" id="contentSub">描述</div>
            <div class="item-list" id="itemList">
                <div class="empty-state">📭 暂无内容，点击下方添加</div>
            </div>
            <button class="add-btn" id="addItemBtn">➕ 添加新条目</button>
        </div>

        <div class="footer">
            📌 所有分区和条目均可自定义 · 数据保存在本地浏览器
        </div>
    </div>

    <!-- ===== 模态框：新建/编辑分区 ===== -->
    <div class="modal" id="sectionModal">
        <div class="modal-box">
            <h2 id="sectionModalTitle">新建分区</h2>
            <label>分区名称 *</label>
            <input type="text" id="sectionNameInput" placeholder="例如：量子计算笔记">
            <label>图标 (Emoji)</label>
            <input type="text" id="sectionEmojiInput" placeholder="例如：🔬" value="📁">
            <label>描述</label>
            <input type="text" id="sectionDescInput" placeholder="简短描述该分区的用途">
            <div class="actions">
                <button class="btn btn-outline" onclick="closeSectionModal()">取消</button>
                <button class="btn btn-primary" id="saveSectionBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const CONFIG = {
            password: 'study2025',
            storageKey: 'knowledge_base_custom'
        };

        // ============================================================
        // 数据管理（完全可自定义）
        // ============================================================
        let data = {};
        let editingSectionKey = null;
        let currentSection = null;

        // 默认分区（首次使用时初始化）
        function getDefaultSections() {
            return {
                notes: {
                    label: '课程笔记',
                    icon: '📝',
                    desc: '各科课堂笔记、讲义整理',
                    items: []
                },
                coding: {
                    label: '编程空间',
                    icon: '💻',
                    desc: '代码片段、算法练习、项目',
                    items: []
                },
                practice: {
                    label: '刷题室',
                    icon: '📊',
                    desc: 'Past papers、习题集、模拟',
                    items: []
                },
                review: {
                    label: '知识巩固',
                    icon: '🔄',
                    desc: '间隔复习、知识卡片',
                    items: []
                },
                retro: {
                    label: '阶段回顾',
                    icon: '📅',
                    desc: '周/月总结、目标追踪',
                    items: []
                },
                charge: {
                    label: '课程充电站',
                    icon: '⚡',
                    desc: '课程 Sheets、拓展资源',
                    items: []
                }
            };
        }

        function loadData() {
            const stored = localStorage.getItem(CONFIG.storageKey);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    // 检查数据是否完整（每个分区必须有 items 数组）
                    let valid = true;
                    for (const key of Object.keys(parsed)) {
                        if (!parsed[key].items || !Array.isArray(parsed[key].items)) {
                            valid = false;
                            break;
                        }
                        if (!parsed[key].label || !parsed[key].icon) {
                            valid = false;
                            break;
                        }
                    }
                    if (valid && Object.keys(parsed).length > 0) {
                        data = parsed;
                        return;
                    }
                } catch (e) {
                    // 数据损坏，使用默认
                }
            }
            // 首次使用或数据损坏，初始化默认分区
            data = getDefaultSections();
            saveData();
        }

        function saveData() {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(data));
            renderSections();
            updateCounts();
        }

        function getSectionKeys() {
            return Object.keys(data);
        }

        function getItems(sectionKey) {
            return data[sectionKey]?.items || [];
        }

        // ============================================================
        // 分区操作
        // ============================================================
        function addSection(key, label, icon, desc) {
            if (data[key]) {
                alert('该分区标识已存在，请换一个');
                return false;
            }
            data[key] = {
                label: label,
                icon: icon || '📁',
                desc: desc || '',
                items: []
            };
            saveData();
            return true;
        }

        function updateSection(key, label, icon, desc) {
            if (!data[key]) return false;
            data[key].label = label;
            data[key].icon = icon || '📁';
            data[key].desc = desc || '';
            saveData();
            return true;
        }

        function deleteSection(key) {
            if (!data[key]) return false;
            if (getItems(key).length > 0) {
                if (!confirm(`分区「${data[key].label}」中有 ${getItems(key).length} 个条目，确定要删除整个分区吗？`)) {
                    return false;
                }
            } else {
                if (!confirm(`确定要删除分区「${data[key].label}」吗？`)) {
                    return false;
                }
            }
            delete data[key];
            saveData();
            return true;
        }

        // ============================================================
        // 条目操作
        // ============================================================
        function addItem(sectionKey, name, meta = '') {
            if (!data[sectionKey]) return;
            data[sectionKey].items.push({
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
                name: name,
                meta: meta,
                createdAt: new Date().toLocaleDateString()
            });
            saveData();
            renderItems(sectionKey);
        }

        function deleteItem(sectionKey, id) {
            if (!data[sectionKey]) return;
            data[sectionKey].items = data[sectionKey].items.filter(item => item.id !== id);
            saveData();
            renderItems(sectionKey);
        }

        function updateItem(sectionKey, id, newName, newMeta) {
            if (!data[sectionKey]) return;
            const item = data[sectionKey].items.find(it => it.id === id);
            if (item) {
                item.name = newName;
                item.meta = newMeta || item.meta;
                saveData();
                renderItems(sectionKey);
            }
        }

        // ============================================================
        // 渲染
        // ============================================================
        function renderSections() {
            const grid = document.getElementById('sectionGrid');
            const keys = getSectionKeys();

            if (keys.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:#6b7f98; background:white; border-radius:20px;">
                        <h3 style="color:#1e2a41; margin-bottom:6px;">📭 暂无分区</h3>
                        <p style="font-size:14px;">点击右上角「新建分区」开始创建</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = keys.map(key => {
                const section = data[key];
                const itemCount = section.items.length;
                return `
                    <div class="section-card" data-section="${key}">
                        <div class="card-actions">
                            <button onclick="event.stopPropagation(); editSection('${key}')" title="编辑分区">✏️</button>
                            <button class="del" onclick="event.stopPropagation(); deleteSection('${key}')" title="删除分区">✕</button>
                        </div>
                        <span class="emoji">${section.icon || '📁'}</span>
                        <h3>${section.label}</h3>
                        <p>${section.desc || '无描述'}</p>
                        <span class="count">${itemCount} 项</span>
                    </div>
                `;
            }).join('');

            // 绑定点击事件
            grid.querySelectorAll('.section-card').forEach(card => {
                card.addEventListener('click', function() {
                    const key = this.dataset.section;
                    if (key) openSection(key);
                });
            });

            updateCounts();
        }

        function renderItems(sectionKey) {
            const items = getItems(sectionKey);
            const list = document.getElementById('itemList');

            if (items.length === 0) {
                list.innerHTML = `<div class="empty-state">📭 暂无内容，点击下方添加</div>`;
                return;
            }

            list.innerHTML = items.map(item => `
                <div class="item">
                    <span class="name">${escapeHtml(item.name)}</span>
                    <span style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                        <span class="meta">${item.meta || ''} ${item.createdAt ? '· '+item.createdAt : ''}</span>
                        <button onclick="editItem('${sectionKey}','${item.id}')" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:14px;">✏️</button>
                        <button onclick="deleteItem('${sectionKey}','${item.id}')" style="background:none;border:none;color:#c72a2a;cursor:pointer;font-size:16px;">✕</button>
                    </span>
                </div>
            `).join('');
        }

        function updateCounts() {
            // 不需要单独更新 counts，renderSections 中已包含
        }

        function openSection(sectionKey) {
            currentSection = sectionKey;
            const section = data[sectionKey];
            if (!section) return;

            document.getElementById('contentTitle').textContent = `${section.icon || '📁'} ${section.label}`;
            document.getElementById('contentSub').textContent = section.desc || '无描述';
            document.getElementById('contentArea').classList.add('active');
            renderItems(sectionKey);
            document.getElementById('contentArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closeContent() {
            document.getElementById('contentArea').classList.remove('active');
            currentSection = null;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // 登录逻辑
        // ============================================================
        function checkLogin() {
            return sessionStorage.getItem('knowledge_logged_in') === 'true';
        }

        function doLogin(pwd) {
            if (pwd === CONFIG.password) {
                sessionStorage.setItem('knowledge_logged_in', 'true');
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('loginError').textContent = '';
                loadData();
                return true;
            } else {
                document.getElementById('loginError').textContent = '❌ 密码错误，请重试';
                return false;
            }
        }

        function doLogout() {
            sessionStorage.removeItem('knowledge_logged_in');
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('pwdInput').value = '';
            document.getElementById('loginError').textContent = '';
        }

        // ============================================================
        // 模态框：新建/编辑分区
        // ============================================================
        function openSectionModal(key = null) {
            const modal = document.getElementById('sectionModal');
            modal.classList.add('show');

            if (key) {
                // 编辑模式
                editingSectionKey = key;
                document.getElementById('sectionModalTitle').textContent = '编辑分区';
                document.getElementById('sectionNameInput').value = data[key].label || '';
                document.getElementById('sectionEmojiInput').value = data[key].icon || '📁';
                document.getElementById('sectionDescInput').value = data[key].desc || '';
                document.getElementById('saveSectionBtn').textContent = '更新';
            } else {
                // 新建模式
                editingSectionKey = null;
                document.getElementById('sectionModalTitle').textContent = '新建分区';
                document.getElementById('sectionNameInput').value = '';
                document.getElementById('sectionEmojiInput').value = '📁';
                document.getElementById('sectionDescInput').value = '';
                document.getElementById('saveSectionBtn').textContent = '创建';
            }
            document.getElementById('sectionNameInput').focus();
        }

        function closeSectionModal() {
            document.getElementById('sectionModal').classList.remove('show');
            editingSectionKey = null;
        }

        function saveSectionFromModal() {
            const name = document.getElementById('sectionNameInput').value.trim();
            const icon = document.getElementById('sectionEmojiInput').value.trim() || '📁';
            const desc = document.getElementById('sectionDescInput').value.trim();

            if (!name) {
                alert('请输入分区名称');
                return;
            }

            if (editingSectionKey) {
                // 更新
                updateSection(editingSectionKey, name, icon, desc);
            } else {
                // 新建：生成 key（拼音或简写）
                let key = name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]/g, '');
                if (!key) key = 'section_' + Date.now().toString(36);
                // 如果 key 已存在，追加数字
                let finalKey = key;
                let counter = 1;
                while (data[finalKey]) {
                    finalKey = key + '_' + counter;
                    counter++;
                }
                addSection(finalKey, name, icon, desc);
            }
            closeSectionModal();
        }

        // ============================================================
        // 编辑条目
        // ============================================================
        function editItem(sectionKey, id) {
            const items = getItems(sectionKey);
            const item = items.find(it => it.id === id);
            if (!item) return;

            const newName = prompt('修改条目名称：', item.name);
            if (newName !== null && newName.trim()) {
                const newMeta = prompt('修改备注（可选）：', item.meta || '');
                updateItem(sectionKey, id, newName.trim(), newMeta || '');
            }
        }

        function editSection(key) {
            openSectionModal(key);
        }

        // ============================================================
        // 导入导出
        // ============================================================
        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `knowledge_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    // 验证数据格式
                    let valid = true;
                    for (const key of Object.keys(imported)) {
                        if (!imported[key].items || !Array.isArray(imported[key].items)) {
                            valid = false;
                            break;
                        }
                        if (!imported[key].label) {
                            valid = false;
                            break;
                        }
                    }
                    if (!valid || Object.keys(imported).length === 0) {
                        alert('❌ 数据格式无效');
                        return;
                    }
                    if (confirm(`将导入 ${Object.keys(imported).length} 个分区，是否覆盖当前数据？（取消则追加）`)) {
                        data = imported;
                    } else {
                        // 追加：合并分区，注意重名处理
                        for (const key of Object.keys(imported)) {
                            if (data[key]) {
                                // 重名，追加到现有分区
                                data[key].items = data[key].items.concat(imported[key].items);
                            } else {
                                data[key] = imported[key];
                            }
                        }
                    }
                    saveData();
                    alert('✅ 导入成功！');
                } catch (err) {
                    alert('❌ 解析失败，请检查 JSON 格式');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ============================================================
        // 修改密码
        // ============================================================
        window.changePassword = function(newPwd) {
            if (newPwd && newPwd.length >= 4) {
                CONFIG.password = newPwd;
                alert('✅ 密码已更新！请记住新密码。');
            } else {
                alert('❌ 密码至少 4 位');
            }
        };

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            // 登录
            document.getElementById('loginBtn').addEventListener('click', function() {
                const pwd = document.getElementById('pwdInput').value;
                doLogin(pwd);
            });
            document.getElementById('pwdInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('loginBtn').click();
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', doLogout);

            // 新建分区
            document.getElementById('addSectionBtn').addEventListener('click', function() {
                openSectionModal();
            });

            // 模态框
            document.getElementById('saveSectionBtn').addEventListener('click', saveSectionFromModal);
            document.getElementById('sectionModal').addEventListener('click', function(e) {
                if (e.target === this) closeSectionModal();
            });
            // 回车键保存
            document.getElementById('sectionNameInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('saveSectionBtn').click();
                }
            });

            // 返回
            document.getElementById('backBtn').addEventListener('click', closeContent);

            // 添加条目
            document.getElementById('addItemBtn').addEventListener('click', function() {
                if (!currentSection) return;
                const name = prompt('请输入条目名称：');
                if (name && name.trim()) {
                    const meta = prompt('备注（可选，如日期或分类）：') || '';
                    addItem(currentSection, name.trim(), meta);
                }
            });

            // 检查登录状态
            if (checkLogin()) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                loadData();
            } else {
                document.getElementById('mainApp').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
