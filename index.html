<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 知识库 · 学习门户 v2.0</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#1a4d7a;--primary-light:#eaf1fa;--bg:#f4f7fc;--card:#fff;--text:#1e2a41;--text-light:#55708b;--shadow:0 4px 20px rgba(0,20,40,0.06);--radius:18px}
        body{font-family:'Inter',-apple-system,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
        .container{max-width:1300px;margin:0 auto}
        #loginOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
        #loginOverlay.hidden{display:none}
        .login-box{background:#fff;max-width:420px;width:100%;padding:40px 36px;border-radius:32px;box-shadow:0 40px 80px rgba(0,0,0,0.2);text-align:center}
        .login-box .icon{font-size:52px;margin-bottom:6px}
        .login-box h2{font-size:22px;font-weight:700;margin-bottom:6px}
        .login-box p{color:var(--text-light);font-size:14px;margin-bottom:22px}
        .login-box input{width:100%;padding:14px 18px;border:2px solid #dce4ed;border-radius:40px;font-size:16px;outline:none;transition:.2s;margin-bottom:14px}
        .login-box input:focus{border-color:var(--primary)}
        .login-box .btn-login{width:100%;padding:14px;border:none;border-radius:40px;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.15s}
        .login-box .btn-login:hover{background:#103a5e}
        .login-box .error{color:#c72a2a;font-size:13px;margin-top:8px;min-height:20px}
        .login-box .hint{font-size:12px;color:#8a9bb0;margin-top:16px}
        .topbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;background:var(--card);padding:12px 24px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
        .topbar h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
        .topbar h1 small{font-weight:400;font-size:13px;color:var(--text-light)}
        .topbar .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .btn{padding:6px 16px;border:none;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:#103a5e}
        .btn-outline{background:transparent;border:1.5px solid #dce4ed;color:var(--text-light)}
        .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
        .section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:24px}
        .section-card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;border-left:5px solid var(--primary);position:relative}
        .section-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,20,40,0.10)}
        .section-card .emoji{font-size:28px;display:block;margin-bottom:2px}
        .section-card h3{font-size:16px;font-weight:700;margin-bottom:2px}
        .section-card p{font-size:13px;color:var(--text-light)}
        .section-card .count{display:inline-block;margin-top:8px;font-size:12px;background:var(--primary-light);color:var(--primary);padding:2px 14px;border-radius:40px;font-weight:600}
        .content-area{background:var(--card);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);min-height:200px;display:none}
        .content-area.active{display:block}
        .content-area .back{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border:1.5px solid #dce4ed;border-radius:40px;font-size:13px;font-weight:600;background:transparent;cursor:pointer;margin-bottom:12px;color:var(--text-light)}
        .content-area .back:hover{border-color:var(--primary);color:var(--primary)}
        .content-area .header-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:4px}
        .content-area .header-row h2{font-size:20px}
        .content-area .item-list{display:flex;flex-direction:column;gap:8px}
        .content-area .item-list .item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f8fafd;border-radius:12px;border:1px solid #eef2f7;transition:.1s;cursor:pointer}
        .content-area .item-list .item:hover{background:#f0f6ff}
        .content-area .item-list .item .left{display:flex;flex-direction:column;gap:2px}
        .content-area .item-list .item .left .name{font-weight:500}
        .content-area .add-btn{margin-top:14px;padding:10px 20px;border:2px dashed #dce4ed;border-radius:40px;background:transparent;font-size:14px;font-weight:600;color:var(--text-light);cursor:pointer;transition:.15s;width:100%}
        .content-area .add-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
        .empty-state{color:var(--text-light);font-size:14px;padding:30px 0;text-align:center}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:10000;padding:20px}
        .modal-overlay.show{display:flex}
        .modal-detail{background:#fff;max-width:560px;width:100%;border-radius:24px;padding:28px 32px;box-shadow:0 40px 80px rgba(0,0,0,0.15);max-height:90vh;overflow-y:auto}
        .modal-detail .close-btn{float:right;background:none;border:none;font-size:24px;color:var(--text-light);cursor:pointer}
        .modal-detail h2{font-size:20px;margin-bottom:4px;padding-right:30px}
        .modal-detail .field{margin-bottom:14px}
        .modal-detail .field label{font-weight:600;font-size:13px;display:block;margin-bottom:2px;color:var(--text-light)}
        .modal-detail .field input,.modal-detail .field textarea{width:100%;padding:8px 12px;border:1px solid #dce4ed;border-radius:8px;font-size:14px;font-family:inherit}
        .modal-detail .field textarea{min-height:60px;resize:vertical}
        .modal-detail .field .link-btn{display:inline-block;background:var(--primary);color:#fff;padding:6px 16px;border-radius:40px;text-decoration:none;font-size:14px;font-weight:600;margin-top:4px}
        .modal-detail .field .link-btn:hover{background:#103a5e}
        .modal-detail .actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
        .footer{text-align:center;font-size:13px;color:var(--text-light);margin-top:24px;padding:12px;border-top:1px solid #eef2f7}
        @media(max-width:600px){body{padding:12px}.topbar{flex-direction:column;align-items:stretch;gap:10px}.section-grid{grid-template-columns:1fr 1fr;gap:12px}.section-card{padding:14px}.content-area{padding:16px}.modal-detail{padding:20px 18px}}
        @media(max-width:400px){.section-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <div class="icon">📚</div>
            <h2>知识库 · 个人门户</h2>
            <p>输入密码以访问您的学习空间</p>
            <input type="password" id="pwdInput" placeholder="请输入密码" autofocus>
            <button class="btn-login" id="loginBtn">进入知识库</button>
            <div class="error" id="loginError"></div>
            <div class="hint">💡 默认密码：<strong>study2025</strong></div>
        </div>
    </div>

    <div class="container" id="mainApp" style="display:none;">
        <header class="topbar">
            <h1>📚 知识库 <small>· v2.0</small></h1>
            <div class="right">
                <button class="btn btn-primary" id="addSectionBtn">➕ 新建分区</button>
                <button class="btn btn-outline" onclick="exportData()">📤 备份</button>
                <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📥 恢复</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                <button class="btn btn-outline" id="logoutBtn">退出</button>
            </div>
        </header>
        <div class="section-grid" id="sectionGrid"></div>
        <div class="content-area" id="contentArea">
            <button class="back" id="backBtn">← 返回</button>
            <div class="header-row">
                <h2 id="contentTitle">标题</h2>
            </div>
            <div class="sub" id="contentSub">描述</div>
            <div class="item-list" id="itemList"><div class="empty-state">📭 暂无内容</div></div>
            <button class="add-btn" id="addItemBtn">➕ 添加新条目</button>
        </div>
        <div class="footer">📌 数据保存在本地浏览器 · 建议定期备份</div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-detail">
            <button class="close-btn" onclick="closeDetail()">✕</button>
            <h2 id="detailTitle">条目</h2>
            <div class="field"><label>📎 资料链接</label><input type="url" id="detailLink" placeholder="粘贴分享链接..."></div>
            <div class="field"><label>🏷️ 标签</label><input type="text" id="detailTagsInput" placeholder="用逗号分隔"></div>
            <div class="field"><label>📝 备注</label><textarea id="detailNote" placeholder="个人笔记..."></textarea></div>
            <div class="actions">
                <button class="btn btn-outline" onclick="closeDetail()">关闭</button>
                <button class="btn btn-primary" id="saveDetailBtn">💾 保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="sectionModal">
        <div class="modal-detail">
            <h2 id="sectionModalTitle">新建分区</h2>
            <div class="field"><label>名称</label><input type="text" id="sectionNameInput" placeholder="例如：量子计算"></div>
            <div class="field"><label>图标</label><input type="text" id="sectionEmojiInput" placeholder="🔬" value="📁"></div>
            <div class="field"><label>描述</label><input type="text" id="sectionDescInput" placeholder="简短描述"></div>
            <div class="actions">
                <button class="btn btn-outline" onclick="closeSectionModal()">取消</button>
                <button class="btn btn-primary" id="saveSectionBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = { password: 'study2025', storageKey: 'knowledge_base_v2' };
        let data = {}, editingSectionKey = null, currentSection = null, editingItemId = null;

        function loadData() {
            const stored = localStorage.getItem(CONFIG.storageKey);
            if (stored) { try { const p = JSON.parse(stored); if (Object.keys(p).length > 0) { data = p; return; } } catch (e) {} }
            data = {
                notes: { label: '课程笔记', icon: '📝', desc: '课堂笔记与讲义', items: [] },
                coding: { label: '编程空间', icon: '💻', desc: '代码与项目', items: [] },
                practice: { label: '刷题室', icon: '📊', desc: '习题与模拟', items: [] }
            };
            saveData();
        }

        function saveData() { localStorage.setItem(CONFIG.storageKey, JSON.stringify(data));
            renderAll(); }

        function renderAll() { renderSections(); if (currentSection) renderItems(currentSection); }

        function renderSections() {
            const grid = document.getElementById('sectionGrid');
            const keys = Object.keys(data);
            if (!keys.length) { grid.innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6b7f98;">📭 暂无分区</div>'; return; }
            grid.innerHTML = keys.map(k => {
                const s = data[k];
                return `<div class="section-card" data-section="${k}">
                    <span class="emoji">${s.icon||'📁'}</span>
                    <h3>${s.label}</h3>
                    <p>${s.desc||''}</p>
                    <span class="count">${s.items.length} 项</span>
                </div>`;
            }).join('');
            grid.querySelectorAll('.section-card').forEach(c => c.addEventListener('click', function() { openSection(this
                    .dataset.section); }));
        }

        function openSection(key) { currentSection = key;
            document.getElementById('contentArea').classList.add('active'); const s = data[key];
            document.getElementById('contentTitle').textContent = s.icon + ' ' + s.label;
            document.getElementById('contentSub').textContent = s.desc || '';
            renderItems(key); }

        function renderItems(key) {
            const items = data[key]?.items || [];
            const list = document.getElementById('itemList');
            if (!items.length) { list.innerHTML = '<div class="empty-state">📭 暂无内容</div>'; return; }
            list.innerHTML = items.map(it =>
                `<div class="item" onclick="openDetail('${key}','${it.id}')">
                    <div class="left"><span class="name">${it.name}</span></div>
                    <div>${it.link ? '🔗' : ''}</div>
                </div>`
            ).join('');
        }

        function openDetail(sectionKey, id) {
            const item = data[sectionKey]?.items.find(i => i.id === id);
            if (!item) return;
            editingItemId = id;
            document.getElementById('detailTitle').textContent = item.name;
            document.getElementById('detailLink').value = item.link || '';
            document.getElementById('detailTagsInput').value = item.tags || '';
            document.getElementById('detailNote').value = item.note || '';
            document.getElementById('detailModal').classList.add('show');
            document.getElementById('saveDetailBtn').onclick = function() {
                const it = data[sectionKey]?.items.find(i => i.id === id);
                if (it) { it.link = document.getElementById('detailLink').value;
                    it.tags = document.getElementById('detailTagsInput').value;
                    it.note = document.getElementById('detailNote').value;
                    saveData();
                    closeDetail(); }
            };
        }

        function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

        // 登录逻辑
        function doLogin(pwd) {
            if (pwd === CONFIG.password) {
                sessionStorage.setItem('knowledge_logged_in', 'true');
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('loginError').textContent = '';
                loadData();
                return true;
            } else {
                document.getElementById('loginError').textContent = '❌ 密码错误';
                return false;
            }
        }

        function doLogout() {
            sessionStorage.removeItem('knowledge_logged_in');
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('pwdInput').value = '';
            document.getElementById('loginError').textContent = '';
        }

        // 导出/导入
        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `knowledge_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try { const d = JSON.parse(e.target.result); if (Object.keys(d).length) { data = d;
                        saveData();
                        alert('✅ 导入成功！'); } } catch (err) { alert('❌ 数据格式无效'); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginBtn').addEventListener('click', function() {
                doLogin(document.getElementById('pwdInput').value);
            });
            document.getElementById('pwdInput').addEventListener('keydown', function(e) { if (e.key === 'Enter')
                    document.getElementById('loginBtn').click(); });
            document.getElementById('logoutBtn').addEventListener('click', doLogout);
            document.getElementById('backBtn').addEventListener('click', function() {
                document.getElementById('contentArea').classList.remove('active');
                currentSection = null;
            });
            document.getElementById('addItemBtn').addEventListener('click', function() {
                if (!currentSection) return;
                const name = prompt('条目名称：');
                if (name && name.trim()) {
                    data[currentSection].items.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,
                            5), name: name.trim(), link: '', tags: '', note: '', createdAt: new Date()
                            .toLocaleDateString() });
                    saveData();
                }
            });
            document.getElementById('addSectionBtn').addEventListener('click', function() {
                document.getElementById('sectionModal').classList.add('show');
                document.getElementById('sectionModalTitle').textContent = '新建分区';
                document.getElementById('sectionNameInput').value = '';
                document.getElementById('sectionEmojiInput').value = '📁';
                document.getElementById('sectionDescInput').value = '';
                editingSectionKey = null;
                document.getElementById('saveSectionBtn').onclick = function() {
                    const name = document.getElementById('sectionNameInput').value.trim();
                    if (!name) { alert('请输入名称'); return; }
                    const key = name.toLowerCase().replace(/[^a-z0-9]/g, '') || 'sec_' + Date.now().toString(36);
                    let finalKey = key,
                        c = 1;
                    while (data[finalKey]) finalKey = key + '_' + c++;
                    data[finalKey] = { label: name, icon: document.getElementById('sectionEmojiInput').value ||
                            '📁', desc: document.getElementById('sectionDescInput').value || '', items: [] };
                    saveData();
                    document.getElementById('sectionModal').classList.remove('show');
                };
            });
            document.querySelectorAll('.modal-overlay').forEach(el => {
                el.addEventListener('click', function(e) { if (e.target === this) this.classList.remove(
                        'show'); });
            });
            // 检查登录状态
            if (sessionStorage.getItem('knowledge_logged_in') === 'true') {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                loadData();
            }
            window.changePassword = function(newPwd) {
                if (newPwd && newPwd.length >= 4) { CONFIG.password = newPwd;
                    alert('✅ 密码已更新！'); } else { alert('❌ 密码至少4位'); }
            };
        });
    </script>
</body>
</html>
